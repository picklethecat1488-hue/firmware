[workspace]
resolver = "2"
members = [
    "model",
    "peripherals",
    "controller",
    "panic_handler",
    "projects/cat_detector",
    "tools/fs_tool",
]
default-members = [
    "model",
    "peripherals",
    "controller",
    "panic_handler",
    "projects/cat_detector",
    "tools/fs_tool",
]

[profile.release]
opt-level = "s"      # Optimize for size
lto = true           # Enable Link-Time Optimization
codegen-units = 1    # Reduce codegen units to improve size optimizations
panic = "abort"      # Abort on panic to remove stack unwinding tables
strip = true         # Strip symbols and debug info from the binary

[profile.dev]
opt-level = 1        # Enable light optimization to drastically reduce async/embassy code size
debug = 1            # Line tables only, much faster compilation and linking

[profile.test]
debug = 1            # Line tables only, speeds up test compilation and linking

