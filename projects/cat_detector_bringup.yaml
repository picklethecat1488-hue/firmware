project_name: Cat Detector
device_chip: RP2040
flash_addr: 0x101C0000
flash_size: 262144
steps:
  - id: "1"
    name: Verify Fuel Gauge Communication
    type: shell_command
    command: battery
    expected_regex: 'Direct battery reading: \d+ mV, \d+% state of charge'
    description: Verify communication with MAX17048 Fuel Gauge by querying voltage and SOC.

  - id: "2"
    name: Verify Thermal Monitoring
    type: shell_command
    command: thermal
    expected_regex: 'Direct thermal reading \(ThermalController\): \d+\.\d+ C'
    description: Verify communication with the temperature sensor.

  - id: "3"
    name: Verify Time-of-Flight (Proximity) Sensors
    type: shell_command
    command: proximity
    expected_regex: 'Direct proximity readings: North = \d+ mm, East = \d+ mm, West = \d+ mm'
    description: Verify range readings from all three VL53L0X ToF sensors.

  - id: "4"
    name: Verify RP2040 Microcontroller Temperature
    type: shell_command
    command: mcu_temp
    expected_regex: 'Direct system temperature reading \(RP2040\): \d+\.\d+ C'
    description: Verify the RP2040 internal core temperature.

  - id: "5"
    name: Calibrate Time-of-Flight Offset
    type: interactive
    description: Calibrate proximity sensors by placing target near (0mm) and far (100mm) for each direction.
    procedure: |
      1. Run 'cal_near north' with target close.
      2. Run 'cal_far north' with target at 100mm.
      3. Repeat for 'east' and 'west'.

  - id: "6"
    name: Verify Actuator (Pump Motor) Control
    type: interactive
    description: Command the N20 motor to spin at 50% speed and check current draw, then stop it.
    procedure: |
      1. Run 'motor 50' and confirm current draw is ~120mA.
      2. Run 'stop' to halt the motor.

  - id: "7"
    name: Calibrate Motor Current (Water Detection)
    type: interactive
    description: Calibrate motor current draw for empty, 100ml, and full bowl states.
    procedure: |
      1. Run 'cal_motor empty' with empty bowl.
      2. Run 'cal_motor 100ml' with 100ml of water.
      3. Run 'cal_motor full' with full bowl.

  - id: "8"
    name: Verify System Power States
    type: interactive
    description: Verify manual low-power Sleep and Active mode transitions.
    procedure: |
      1. Run 'sleep' to enter low-power sleep state.
      2. Run 'wake' to return to active state.
      3. Run 'activity' to simulate wake-up event.

  - id: "9"
    name: Verify ToF Proximity Interrupts
    type: manual
    description: Put system to sleep, and pull one of ToF interrupt lines (GP7, GP8, GP9) to ground.
    expected: System wakes up to Active state, starts motor and LEDs.

  - id: "10"
    name: Verify Fuel Gauge Alert Interrupt
    type: manual
    description: Pull fuel gauge Alert line (GP10) to ground.
    expected: System wakes up, dispatches battery alert, and blinks NeoPixel red.

  - id: "11"
    name: Verify Panic and Crash Log Capture
    type: shell_command
    command: crash
    expected_regex: '--- PANIC ---'
    description: Force a CPU panic handler test execution to verify logging.

  - id: "12"
    name: Pull Raw Flash Filesystem Partition
    type: host_command
    command: probe-rs read-mem --chip {device_chip} {flash_addr} {flash_size} flash_dump.bin
    description: Dump the 256KB sequential-storage partition from target flash.

  - id: "13"
    name: Verify Directory Structure
    type: host_command
    command: cargo run --bin fs_tool -- --dump flash_dump.bin ls
    expected_regex: 'vl53l0x_cal\.cbor'
    description: Query the filesystem to ensure directory references and files exist.

  - id: "14"
    name: Decode and Export Telemetry Stream
    type: host_command
    command: cargo run --bin fs_tool -- --dump flash_dump.bin export-telemetry telemetry.csv
    description: Decode CBOR updates in telemetry.rrd to telemetry.csv.

  - id: "15"
    name: Decode and Symbolicate Crash Dumps
    type: host_command
    command: cargo run --bin fs_tool -- --dump flash_dump.bin crash-log --elf target/thumbv6m-none-eabi/release/cat_detector
    expected_regex: '(Location:|Backtrace:)'
    description: Verify panic log is decoded and symbolicated using debug ELF.
