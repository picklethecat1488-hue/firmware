project_name: Cat Detector
device_chip: RP2040
flash_addr: 0x101C0000
flash_size: 262144
cargo_target: "cargo run --target thumbv6m-none-eabi --package cat_detector --bin cat_detector_shell --release"
app_cargo_target: "cargo run --target thumbv6m-none-eabi --package cat_detector --bin cat_detector_app --release"
steps:
  - id: "1"
    name: Format Filesystem Partition
    type: shell_command
    command: fs format
    expected_regex: "Formatting successful!|Type 'help' to print usage."
    description: Erase and format the sequential-storage partition.

  - id: "2"
    name: Verify Fuel Gauge Communication
    type: shell_command
    command: battery status
    expected_regex: 'Direct battery reading: \d+ mV, \d+% state of charge'
    description: Verify communication with MAX17048 Fuel Gauge by querying voltage and SOC.

  - id: "3"
    name: Verify Thermal Monitoring
    type: shell_command
    command: thermal status
    expected_regex: 'Direct thermal reading \(ThermalController\): \d+\.\d+ C'
    description: Verify communication with the temperature sensor.

  - id: "4"
    name: Verify Time-of-Flight (Proximity) Sensors
    type: shell_command
    command: sensor status
    expected_regex: 'Direct proximity readings: North = \d+ mm, East = \d+ mm, West = \d+ mm'
    description: Verify range readings from all three VL53L0X ToF sensors.

  - id: "5"
    name: Verify RP2040 Microcontroller Temperature
    type: shell_command
    command: thermal mcu
    expected_regex: 'Direct system temperature reading \(RP2040\): \d+\.\d+ C'
    description: Verify the RP2040 internal core temperature.

  - id: "6a"
    name: Calibrate North Sensor (Near)
    type: shell_command
    command: sensor cal_near north
    expected_regex: 'Saved cover calibration for North to flash.'
    description: Place target close (0mm) to the North proximity sensor first.

  - id: "6b"
    name: Calibrate North Sensor (Far)
    type: shell_command
    command: sensor cal_far north
    expected_regex: 'Saved 100mm calibration for North to flash.'
    description: Place target at 100mm from the North proximity sensor first.

  - id: "6c"
    name: Verify North Sensor Calibration
    type: shell_command
    command: sensor status
    expected_regex: 'Direct proximity readings: North = (9[0-9]|10[0-9]|110) mm'
    description: Verify North sensor reads correct calibrated distance (~100mm).

  - id: "6d"
    name: Calibrate East Sensor (Near)
    type: shell_command
    command: sensor cal_near east
    expected_regex: 'Saved cover calibration for East to flash.'
    description: Place target close (0mm) to the East proximity sensor first.

  - id: "6e"
    name: Calibrate East Sensor (Far)
    type: shell_command
    command: sensor cal_far east
    expected_regex: 'Saved 100mm calibration for East to flash.'
    description: Place target at 100mm from the East proximity sensor first.

  - id: "6f"
    name: Verify East Sensor Calibration
    type: shell_command
    command: sensor status
    expected_regex: 'Direct proximity readings: .* East = (9[0-9]|10[0-9]|110) mm'
    description: Verify East sensor reads correct calibrated distance (~100mm).

  - id: "6g"
    name: Calibrate West Sensor (Near)
    type: shell_command
    command: sensor cal_near west
    expected_regex: 'Saved cover calibration for West to flash.'
    description: Place target close (0mm) to the West proximity sensor first.

  - id: "6h"
    name: Calibrate West Sensor (Far)
    type: shell_command
    command: sensor cal_far west
    expected_regex: 'Saved 100mm calibration for West to flash.'
    description: Place target at 100mm from the West proximity sensor first.

  - id: "6i"
    name: Verify West Sensor Calibration
    type: shell_command
    command: sensor status
    expected_regex: 'Direct proximity readings: .* West = (9[0-9]|10[0-9]|110) mm'
    description: Verify West sensor reads correct calibrated distance (~100mm).

  - id: "7a"
    name: Verify Actuator (Pump Motor) Start
    type: shell_command
    command: motor speed 50
    expected_regex: 'Motor current: \d+ mA'
    description: Spin pump motor at 50% speed.

  - id: "7b"
    name: Verify Actuator (Pump Motor) Stop
    type: shell_command
    command: motor stop
    expected_regex: 'motor stop'
    description: Halt pump motor.

  - id: "8a"
    name: Calibrate Motor Current (Empty Bowl)
    type: shell_command
    command: motor calibrate empty 3000 2500
    expected_regex: 'Saved motor Empty calibration to flash.'
    description: Calibrate motor empty bowl state. Ensure bowl is empty first.

  - id: "8b"
    name: Calibrate Motor Current (Low Water Level)
    type: shell_command
    command: motor calibrate low
    expected_regex: 'Saved motor Low calibration to flash.'
    description: Calibrate motor low bowl state. Fill bowl with low level of water (e.g. 100ml) first.

  - id: "8c"
    name: Calibrate Motor Current (High Water Level)
    type: shell_command
    command: motor calibrate high
    expected_regex: 'Saved motor High calibration to flash.'
    description: Calibrate motor high bowl state. Fill bowl completely first.

  - id: "8d"
    name: Calibrate Motor Current (Overload Stall)
    type: shell_command
    command: motor calibrate overload
    expected_regex: 'Saved motor Overload calibration to flash.'
    description: Calibrate motor overload state. Hold impeller in place (simulating stall) first.

  - id: "9a"
    name: Verify Panic and Crash Log Capture
    type: shell_command
    flash_before: shell
    command: system crash
    expected_regex: "Type 'help' to print usage."
    description: Force a CPU panic handler test execution to verify logging.

  - id: "9b"
    name: Verify Core 1 Panic Capture
    type: shell_command
    command: core1 panic
    expected_regex: "Type 'help' to print usage."
    description: Trigger a simulated panic on Core 1 executor and verify crash log generation.

  - id: "10"
    name: Verify System Power States
    type: interactive
    flash_before: app
    description: Verify low-power Sleep and Active mode transitions.
    procedure: |
      1. Let the system sit idle for 30 seconds until it automatically transitions to low-power Sleep state.
      2. Place an object close to one of the proximity sensors (e.g. North, East, or West ToF sensor) and verify the system returns to Active state.

  - id: "11"
    name: Verify Fuel Gauge Alert Interrupt
    type: manual
    flash_before: app
    description: Pull fuel gauge Alert line (GP10) to ground.
    expected: System wakes up, dispatches battery alert, and blinks NeoPixel red.

  - id: "12"
    name: Verify Directory Structure
    type: shell_command
    flash_before: shell
    command: fs ls
    expected_regex: 'vl53l0x_cal\.cbor'
    description: Query the filesystem to ensure directory references and files exist.

  - id: "13"
    name: Decode and Export Telemetry Stream
    type: host_command
    command: cargo run --package host_fs --bin host_fs -- --elf {shell_elf} export-telemetry telemetry.csv
    description: Decode CBOR updates in telemetry.rrd to telemetry.csv.

  - id: "14"
    name: Decode and Symbolicate Crash Dumps
    type: host_command
    command: cargo run --package host_fs --bin host_fs -- --elf {shell_elf} crash-log
    expected_regex: '(Location:|Backtrace:)'
    description: Verify panic log is decoded and symbolicated using debug ELF.

  - id: "15"
    name: Flash Production App
    type: manual
    flash_before: app
    description: Flash the production app binary back to the target device as the final bringup step.
    expected: Production app binary is flashed and running on target.
