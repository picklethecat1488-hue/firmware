name: CI Gate Validation

on:
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  validate:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install Rust toolchain
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          target: thumbv6m-none-eabi
          components: clippy, rustfmt, llvm-tools-preview

      - name: Install cargo-nextest
        uses: taiki-e/install-action@nextest

      - name: Run Formatting and Clippy Lints
        run: ./scripts/run_clippy.sh

      - name: Run Tests
        run: ./scripts/run_tests.sh test_report.txt

      - name: Build Firmware and Tools
        run: ./scripts/build_firmware.sh

      - name: Analyze cat_detector Memory
        if: ${{ !env.ACT }}
        uses: membrowse/membrowse-action@v1
        with:
          elf: target/thumbv6m-none-eabi/release/cat_detector
          target_name: cat_detector
          api_key: ${{ secrets.MEMBROWSE_API_KEY }}

      - name: Upload Test Reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: validation-reports
          path: |
            test_report.txt
