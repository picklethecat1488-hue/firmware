name: CI Gate Validation

on:
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  validate:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install System Dependencies (Linux)
        run: |
          sudo apt-get update
          sudo apt-get install -y libudev-dev pkg-config

      - name: Install Rust toolchain
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          target: thumbv6m-none-eabi
          components: clippy, rustfmt, llvm-tools-preview

      - name: Install cargo-nextest
        uses: taiki-e/install-action@nextest

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Python dependencies for tracing validation
        run: |
          python -m pip install --upgrade pip
          pip install tree-sitter==0.26.0 tree-sitter-rust==0.24.2

      - name: Run Codebase Validations
        run: ./scripts/validate_codebase.sh

      - name: Run Tests
        run: ./scripts/run_tests.sh test_report.txt

      - name: Build Firmware and Tools
        run: ./scripts/build_firmware.sh

      - name: Analyze cat_detector Memory
        if: ${{ !env.ACT }}
        uses: membrowse/membrowse-action@v1
        with:
          elf: target/thumbv6m-none-eabi/release/cat_detector/app
          target_name: cat_detector
          api_key: ${{ secrets.MEMBROWSE_API_KEY }}

      - name: Upload Test Reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: validation-reports
          path: |
            test_report.txt

  validate-python:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Miniconda
        uses: conda-incubator/setup-miniconda@v3
        with:
          activate-environment: firmware-env
          environment-file: environment.yml
          auto-activate-base: false

      - name: Run Ruff Lints & Formatting Checks
        shell: bash -el {0}
        run: |
          ruff check scripts/
          ruff format --check scripts/

      - name: Run Pytest
        shell: bash -el {0}
        run: |
          pytest scripts/tests --junitxml=python_test_report.xml

      - name: Upload Python Test Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: validation-python-test-reports
          path: python_test_report.xml

