name: Create Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build-host-tools:
    name: Build Host Tools for ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install System Dependencies (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y libudev-dev pkg-config

      - name: Install Rust toolchain
        uses: actions-rust-lang/setup-rust-toolchain@v1

      - name: Build and Package Host Tools
        shell: bash
        run: ./scripts/build_host_tools.sh --zip host-tools-${{ matrix.os }}.zip

      - name: Upload Host Tools Artifact
        uses: actions/upload-artifact@v4
        with:
          name: host-tools-${{ matrix.os }}
          path: host-tools-${{ matrix.os }}.zip

  build-and-release:
    needs: build-host-tools
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: read
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install System Dependencies (Linux)
        run: |
          sudo apt-get update
          sudo apt-get install -y libudev-dev pkg-config

      - name: Install Rust toolchain
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          target: thumbv6m-none-eabi
          components: clippy, rustfmt, llvm-tools-preview

      - name: Install cargo-nextest
        uses: taiki-e/install-action@nextest

      - name: Run Tests
        run: ./scripts/run_tests.sh test_report.txt

      - name: Run Clippy Verification (Host)
        run: |
          cargo clippy --all-targets -- -D warnings | tee clippy_host_report.txt

      - name: Run Clippy Verification (Target MCU)
        run: |
          cargo clippy --workspace $(cargo metadata --format-version 1 | jq -r '.packages[] | select(.manifest_path | contains("/tools/")) | "--exclude " + .name') --lib --bins --target thumbv6m-none-eabi -- -D warnings | tee clippy_target_report.txt

      - name: Build and Organize Firmware
        run: ./scripts/build_firmware.sh --out-dir build

      - name: Copy Verification Reports to Package
        run: |
          cp test_report.txt build/
          cp clippy_host_report.txt build/
          cp clippy_target_report.txt build/

      - name: Binary Size Report
        run: ./scripts/generate_size_report.sh build/size_report.txt

      - name: Package Firmware Binaries and Reports
        run: |
          zip -r firmware.zip build/

      - name: Download Host Tools (Linux)
        uses: actions/download-artifact@v4
        with:
          name: host-tools-ubuntu-latest
          path: ./

      - name: Download Host Tools (macOS)
        uses: actions/download-artifact@v4
        with:
          name: host-tools-macos-latest
          path: ./

      - name: Download Host Tools (Windows)
        uses: actions/download-artifact@v4
        with:
          name: host-tools-windows-latest
          path: ./

      - name: Draft Release Notes
        id: release-drafter
        uses: release-drafter/release-drafter@v6
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          body: ${{ steps.release-drafter.outputs.body }}
          files: |
            firmware.zip
            host-tools-ubuntu-latest.zip
            host-tools-macos-latest.zip
            host-tools-windows-latest.zip

      - name: Upload Test and Size Reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: release-validation-reports
          path: |
            test_report.txt
            clippy_host_report.txt
            clippy_target_report.txt
            build/size_report.txt
