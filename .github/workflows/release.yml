name: Create Release

on:
  push:
    tags:
      - 'v*'

jobs:
  validate:
    name: Run Unit Tests and Lints
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install System Dependencies (Linux)
        run: |
          sudo apt-get update
          sudo apt-get install -y libudev-dev pkg-config

      - name: Install Rust toolchain
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          target: thumbv6m-none-eabi
          components: clippy, rustfmt, llvm-tools-preview

      - name: Install cargo-nextest
        uses: taiki-e/install-action@nextest

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Python dependencies for validations
        run: |
          python -m pip install --upgrade pip
          pip install tree-sitter==0.26.0 tree-sitter-rust==0.24.2 colorama halo

      - name: Run Codebase Validations
        run: ./tools/validation/validate_codebase.sh validation_report.txt

      - name: Run Tests
        run: ./tools/run_tests.sh test_report.txt

      - name: Upload Validation Reports
        uses: actions/upload-artifact@v4
        with:
          name: validation-reports
          path: |
            validation_report.txt
            test_report.txt

  build-host-tools:
    name: Build Host Tools for ${{ matrix.os }}
    needs: validate
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install System Dependencies (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y libudev-dev pkg-config

      - name: Install Rust toolchain
        uses: actions-rust-lang/setup-rust-toolchain@v1

      - name: Build and Package Host Tools
        shell: bash
        run: ./tools/build/build_host_tools.sh --zip host-tools-${{ matrix.os }}.zip

      - name: Upload Host Tools Artifact
        uses: actions/upload-artifact@v4
        with:
          name: host-tools-${{ matrix.os }}
          path: host-tools-${{ matrix.os }}.zip

  build-and-release:
    needs: [validate, build-host-tools]
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: read
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install System Dependencies (Linux)
        run: |
          sudo apt-get update
          sudo apt-get install -y libudev-dev pkg-config

      - name: Install Rust toolchain
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          target: thumbv6m-none-eabi
          components: llvm-tools-preview

      - name: Download Validation Reports
        uses: actions/download-artifact@v4
        with:
          name: validation-reports
          path: ./

      - name: Build and Organize Firmware
        run: ./tools/build/build_firmware.sh --out-dir build

      - name: Copy Verification Reports to Package
        run: |
          cp test_report.txt build/
          cp validation_report.txt build/

      - name: Binary Size Report
        run: ./tools/helpers/generate_size_report.sh build/size_report.txt

      - name: Package Firmware Binaries and Reports
        run: |
          zip -r firmware.zip build/

      - name: Download Host Tools (Linux)
        uses: actions/download-artifact@v4
        with:
          name: host-tools-ubuntu-latest
          path: ./

      - name: Download Host Tools (macOS)
        uses: actions/download-artifact@v4
        with:
          name: host-tools-macos-latest
          path: ./

      - name: Download Host Tools (Windows)
        uses: actions/download-artifact@v4
        with:
          name: host-tools-windows-latest
          path: ./

      - name: Draft Release Notes
        id: release-drafter
        uses: release-drafter/release-drafter@v6
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          body: ${{ steps.release-drafter.outputs.body }}
          files: |
            firmware.zip
            host-tools-ubuntu-latest.zip
            host-tools-macos-latest.zip
            host-tools-windows-latest.zip

      - name: Upload Test and Size Reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: release-validation-reports
          path: |
            test_report.txt
            validation_report.txt
            build/size_report.txt
