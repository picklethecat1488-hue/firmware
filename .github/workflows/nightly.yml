name: Nightly Build and Test

on:
  push:
    branches: [main]
  schedule:
    - cron: '0 0 * * *' # Runs at 00:00 UTC every day
  workflow_dispatch: # Allows manual triggering

jobs:
  test:
    name: Run Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          target: thumbv6m-none-eabi
          components: clippy, rustfmt

      - name: Check Formatting
        run: cargo fmt --all --check | tee format_report.txt

      - name: Run Host Tests
        run: cargo test | tee test_report.txt

      - name: Run Clippy (Host Targets)
        run: cargo clippy --all-targets -- -D warnings | tee clippy_host_report.txt

      - name: Run Clippy (Target MCU)
        run: cargo clippy --workspace --lib --bins --target thumbv6m-none-eabi -- -D warnings | tee clippy_target_report.txt

      - name: Upload Test Reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: nightly-test-reports
          path: |
            format_report.txt
            test_report.txt
            clippy_host_report.txt
            clippy_target_report.txt

  build:
    name: Build Hardware Firmware
    needs: test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          target: thumbv6m-none-eabi

      - name: Build Target MCU Binaries (Debug & Release)
        run: |
          cargo build --workspace --bins --target thumbv6m-none-eabi
          cargo build --release --workspace --bins --target thumbv6m-none-eabi

      - name: Organize Build Outputs
        run: |
          mkdir -p build/debug build/release
          # Dynamically copy all compiled top-level target binaries
          find target/thumbv6m-none-eabi/debug -maxdepth 1 -type f -exec cp {} build/debug/ \;
          find target/thumbv6m-none-eabi/release -maxdepth 1 -type f -exec cp {} build/release/ \;

      - name: Binary Size Report
        run: |
          echo "=== Debug Binaries Size ===" | tee build/size_report.txt
          find target/thumbv6m-none-eabi/debug -maxdepth 1 -type f -exec size {} + | tee -a build/size_report.txt
          echo "=== Release Binaries Size ===" | tee -a build/size_report.txt
          find target/thumbv6m-none-eabi/release -maxdepth 1 -type f -exec size {} + | tee -a build/size_report.txt

      - name: Download Test Reports
        uses: actions/download-artifact@v4
        with:
          name: nightly-test-reports
          path: build/

      - name: Upload Build Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: nightly-build
          path: build/
