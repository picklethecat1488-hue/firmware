name: Nightly Build and Test

on:
  push:
    branches: [main]
  schedule:
    - cron: '0 0 * * *' # Runs at 00:00 UTC every day
  workflow_dispatch: # Allows manual triggering

jobs:
  test:
    name: Run Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install System Dependencies (Linux)
        run: |
          sudo apt-get update
          sudo apt-get install -y libudev-dev pkg-config

      - name: Install Rust toolchain
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          target: thumbv6m-none-eabi
          components: clippy, rustfmt

      - name: Install cargo-nextest
        uses: taiki-e/install-action@nextest

      - name: Check Formatting
        run: cargo fmt --all --check | tee format_report.txt

      - name: Run Tests
        run: ./scripts/run_tests.sh test_report.txt

      - name: Run Clippy (Host Targets)
        run: cargo clippy --all-targets -- -D warnings | tee clippy_host_report.txt

      - name: Run Clippy (Target MCU)
        run: cargo clippy --workspace $(cargo metadata --format-version 1 | jq -r '.packages[] | select(.manifest_path | contains("/tools/")) | "--exclude " + .name') --lib --bins --target thumbv6m-none-eabi -- -D warnings | tee clippy_target_report.txt

      - name: Upload Test Reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: nightly-test-reports
          path: |
            format_report.txt
            test_report.txt
            clippy_host_report.txt
            clippy_target_report.txt

  build:
    name: Build Hardware Firmware
    needs: test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install System Dependencies (Linux)
        run: |
          sudo apt-get update
          sudo apt-get install -y libudev-dev pkg-config

      - name: Install Rust toolchain
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          target: thumbv6m-none-eabi
          components: llvm-tools-preview

      - name: Build and Organize Firmware
        run: ./scripts/build_firmware.sh --out-dir build

      - name: Analyze cat_detector Memory
        if: ${{ !env.ACT }}
        uses: membrowse/membrowse-action@v1
        with:
          elf: build/release/embedded/cat_detector
          target_name: cat_detector
          api_key: ${{ secrets.MEMBROWSE_API_KEY }}

      - name: Download Test Reports
        uses: actions/download-artifact@v4
        with:
          name: nightly-test-reports
          path: build/

      - name: Upload Build Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: nightly-build
          path: build/
